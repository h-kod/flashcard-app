0"/><text class="label" x="300.0" y="251.5" text-anchor="middle">işleme</text><path class="line" d="M 270 245 L 330 400"/><text class="label" x="300.0" y="316.5" text-anchor="middle">yönetim</text><path class="line" d="M 650 140 L 760 240"/><text class="label" x="705.0" y="184.0" text-anchor="middle">tüm işlemler</text><path class="line-soft" d="M 650 270 L 760 240"/><text class="label" x="705.0" y="249.0" text-anchor="middle">sonuç gösterimi</text><path class="line-soft" d="M 650 400 L 760 240"/><text class="label" x="705.0" y="314.0" text-anchor="middle">kalıcı kayıt</text><text class="text" x="700" y="585" text-anchor="middle" style="font-size:15px; fill:#0f172a;"><tspan x="700" dy="0">Kapsam özeti: uygulama metin yükleme, otomatik kart üretimi, kart yönetimi</tspan><tspan x="700" dy="20">ve dışa aktarma işlevlerini destekler.</tspan></text>
