services:
  - type: web
    name: hyzm-flashcard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: GEMINI_MODEL
        value: models/gemma-3-1b-it
      - key: GEMINI_API_ROOTS
        value: https://generativelanguage.googleapis.com/v1
      - key: GEMINI_API_KEY
        sync: false
