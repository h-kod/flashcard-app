{% extends 'base.html' %}

{% block content %}
<section class="error-page">
  <div class="error-container">
    <div class="error-content">
      <h1>{{ title }}</h1>
      <p class="error-message">{{ message }}</p>
      <a href="{{ url_for('main.index') }}" class="cta-btn">
        Anasayfaya Dön
      </a>
    </div>
  </div>
</section>

<style>
  .error-page {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    padding: 2rem;
  }

  .error-container {
    text-align: center;
    max-width: 500px;
  }

  .error-content h1 {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    color: #dc2626;
  }

  .error-message {
    font-size: 1.1rem;
    margin-bottom: 2rem;
    color: #666;
  }

  .cta-btn {
    display: inline-block;
    padding: 0.75rem 2rem;
    background-color: #5b21b6;
    color: white;
    text-decoration: none;
    border-radius: 0.5rem;
    transition: background-color 0.3s;
  }

  .cta-btn:hover {
    background-color: #4c1d95;
  }
</style>
{% endblock %}
